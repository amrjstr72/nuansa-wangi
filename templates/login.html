<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nuansa Wangi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f7ff 0%, #f8fdff 55%, #ffffff 100%);
            color: #0f172a;
        }
        .login-card {
            width: min(420px, 100%);
            padding: 36px;
            background: rgba(255,255,255,0.94);
            border: 1px solid #bae6fd;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(14, 116, 144, 0.16);
        }
        .brand {
            text-align: center;
            margin-bottom: 26px;
        }
        .brand img {
            width: 150px;
            max-width: 70%;
            height: auto;
            object-fit: contain;
            margin-bottom: 16px;
        }
        .brand h1 {
            font-size: 24px;
            font-weight: 800;
            color: #075985;
            margin-bottom: 4px;
        }
        .brand p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }
        .input-group-custom {
            position: relative;
            margin-bottom: 14px;
        }
        .input-group-custom i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #0ea5e9;
        }
        .input-group-custom input {
            width: 100%;
            padding: 13px 15px 13px 44px;
            border: 1px solid #dbeafe;
            border-radius: 14px;
            background: #f8fdff;
            font-size: 15px;
            transition: 0.2s;
        }
        .input-group-custom input:focus {
            outline: none;
            border-color: #38bdf8;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            color: #ffffff;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            box-shadow: 0 14px 28px rgba(14, 165, 233, 0.24);
        }
        .alert-danger {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: #b91c1c;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="brand">
            <img src="{{ url_for('static', filename='img/nuansawangi.png') }}" alt="Nuansa Wangi">
            <h1>Customer Intelligence</h1>
            <p>Masuk untuk mengelola data pelanggan</p>
        </div>

        <form method="POST" action="/login">
            <div class="input-group-custom">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username" required autofocus>
            </div>
            <div class="input-group-custom">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Masuk
            </button>
        </form>

        {% if error %}
        <div class="alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
        </div>
        {% endif %}
    </main>
</body>
</html>
